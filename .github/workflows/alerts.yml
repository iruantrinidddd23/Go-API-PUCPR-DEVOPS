name: Alerts

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed
  push:
    branches:
      - main

jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not configured."
            exit 1
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            MESSAGE="PR update in ${REPOSITORY}%0AActor: ${ACTOR}%0ABranch: ${REF_NAME}%0APR: ${PR_URL}%0AMerged: ${PR_MERGED}%0ACommit: ${SHA}"
          else
            MESSAGE="Push on main in ${REPOSITORY}%0AActor: ${ACTOR}%0ACommit: ${SHA}"
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\":\"${MESSAGE}\"}" \
            "$DISCORD_WEBHOOK_URL"
