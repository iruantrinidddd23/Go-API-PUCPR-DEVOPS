name: CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux binary
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/go-api-linux .

      - name: Build Windows binary
        run: GOOS=windows GOARCH=amd64 go build -o dist/go-api-windows.exe .

      - name: Pack release bundle
        run: tar -czf dist/go-api-${{ github.sha }}.tar.gz -C dist .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-api-build
          path: dist/
          retention-days: 7
